<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#sheen)"/>

  <!-- Back card (stacked history) -->
  <rect x="362" y="250" width="360" height="470" rx="46" fill="#ffffff" opacity="0.28"/>
  <!-- Mid card -->
  <rect x="326" y="288" width="372" height="470" rx="48" fill="#ffffff" opacity="0.45"/>

  <!-- Front clipboard -->
  <rect x="288" y="326" width="386" height="468" rx="52" fill="#ffffff"/>

  <!-- Clip on top -->
  <rect x="406" y="262" width="150" height="118" rx="38" fill="url(#bg)"/>
  <rect x="406" y="262" width="150" height="118" rx="38" fill="none" stroke="#ffffff" stroke-width="30"/>

  <!-- Clip history lines -->
  <g fill="url(#bg)">
    <rect x="350" y="470" width="262" height="40" rx="20"/>
    <rect x="350" y="556" width="262" height="40" rx="20"/>
    <rect x="350" y="642" width="170" height="40" rx="20"/>
  </g>
</svg>
